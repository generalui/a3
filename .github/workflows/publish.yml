name: Publish
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'example/**'
      - 'package.json'
      - 'create/**'
      - 'providers/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC with npm
  contents: write   # push tag

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment:
      name: main
    strategy:
      matrix:
        include:
          - package: lib
            path: .
            makeLatest: true
            name: '@genui-a3/core'
            files: |
              src/**
              example/**
              package.json
          - package: create
            path: create
            makeLatest: false
            name: '@genui-a3/create'
            files: create/**
          - package: providers
            path: providers
            makeLatest: false
            name: '@genui-a3/providers'
            files: providers/**
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: ${{ matrix.files }}

      - name: Version and Release Setup
        run: |
          if [ "${{ matrix.path }}" = "." ]; then
            version=$(cat package.json | jq -r '.version')
          else
            version=$(cat ${{ matrix.path }}/package.json | jq -r '.version')
          fi
          version_tag="${{ matrix.package }}-${version}"

          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "version_tag=${version_tag}" >> $GITHUB_OUTPUT

          echo "::group::Version Tag"
          echo "Version Tag: ${version_tag}"
          echo "::endgroup::"
        shell: bash
        id: version

      - name: Check for Tag
        id: check_tag
        run: |
          if [ "${{ steps.changed-files.outputs.any_changed }}" != "true" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              echo "No files changed for ${{ matrix.package }}, skipping publish."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
          fi

          tag="${{ steps.version.outputs.version_tag }}"

          if git show-ref --tags --verify --quiet "refs/tags/${tag}"; then
              echo "The tag ${tag} already exists, skipping publish for ${{ matrix.package }}."
              echo "skip=true" >> $GITHUB_OUTPUT
          else
              echo "Proceeding with publish for ${{ matrix.package }}."
              echo "skip=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Setup Node JS
        if: steps.check_tag.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: 'npm'
          cache-dependency-path: ${{ matrix.path == 'create' && 'create/package-lock.json' || 'package-lock.json' }}

      - name: Install Dependencies
        if: steps.check_tag.outputs.skip != 'true'
        run: |
          if [ "${{ matrix.path }}" = "create" ]; then
            cd create && npm ci
          else
            npm ci
            if [ "${{ matrix.path }}" = "providers" ]; then
              npm run build:core
            fi
          fi
        shell: bash

      - name: Push new tag
        if: steps.check_tag.outputs.skip != 'true'
        id: image_tags
        run: |
          version_tag="${{ steps.version.outputs.version_tag }}"

          echo "new_tag=${version_tag}" >> $GITHUB_OUTPUT

          echo "::group::New Tag"
          echo "New Tag: ${version_tag}"
          echo "::endgroup::"

          git tag "${version_tag}"
          git push origin "${version_tag}"

          # Get all tags sorted by version, filtered by the package prefix
          previous_tag=$(git tag --sort=-v:refname | grep -E "^${{ matrix.package }}-[0-9]+\.[0-9]+\.[0-9]+$" | sed -n '2p')

          echo "previous_tag=${previous_tag}" >> $GITHUB_OUTPUT

          echo "::group::Previous Tag"
          echo "Previous Tag: ${previous_tag}"
          echo "::endgroup::"
        shell: bash

      - name: Create/Update CHANGELOG
        if: steps.check_tag.outputs.skip != 'true'
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          excludeTypes: ''
          fromTag: ${{ steps.image_tags.outputs.previous_tag != '' && steps.image_tags.outputs.new_tag || '' }}
          includeInvalidCommits: true
          tag: ${{ steps.image_tags.outputs.previous_tag == '' && steps.image_tags.outputs.new_tag || '' }}
          toTag: ${{ steps.image_tags.outputs.previous_tag != '' && steps.image_tags.outputs.previous_tag || '' }}
          token: ${{ github.token }}
          writeToFile: false

      - name: Publish to NPM
        if: steps.check_tag.outputs.skip != 'true'
        run: |
          if [ "${{ matrix.path }}" = "." ]; then
            npm publish --access public
          else
            cd ${{ matrix.path }} && npm publish --access public
          fi
        shell: bash

      - name: Create release
        if: steps.check_tag.outputs.skip != 'true'
        uses: ncipollo/release-action@v1
        with:
          body: ${{ steps.changelog.outputs.changes }}
          makeLatest: ${{ matrix.makeLatest }}
          name: '${{ matrix.name }} v${{ steps.version.outputs.version }}'
          prerelease: false
          skipIfReleaseExists: true
          tag: ${{ steps.image_tags.outputs.new_tag }}

      - name: Clean up on failure
        if: ${{ failure() && steps.image_tags.outputs.new_tag }}
        run: |
          git push --delete origin "${{ steps.image_tags.outputs.new_tag }}"
        shell: bash
