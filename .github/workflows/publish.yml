name: Publish
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC with npm
  contents: write   # push tag

jobs:
  publish:
    name: Publish All Packages
    runs-on: ubuntu-latest
    environment:
      name: main
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"
        shell: bash

      - name: Check tag and changes
        id: check_tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if git show-ref --tags --verify --quiet "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists — version has not been bumped."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the most recent v* tag to diff against
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1 || true)

          if [ -n "$LATEST_TAG" ]; then
            CHANGES=$(git diff --name-only "$LATEST_TAG"..HEAD -- \
              src/ providers/ create/ package.json example/)

            if [ -z "$CHANGES" ]; then
              echo "No package-relevant changes since ${LATEST_TAG}, skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "::group::Changed files since ${LATEST_TAG}"
            echo "$CHANGES"
            echo "::endgroup::"
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup Node JS
        if: steps.check_tag.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            create/package-lock.json

      - name: Install and build
        if: steps.check_tag.outputs.skip != 'true'
        run: |
          npm ci
          npm run build:core
          npm run build:providers
          cd create && npm ci && npm run build && cd ..
        shell: bash

      - name: Publish all packages
        if: steps.check_tag.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          echo "::group::Publish @genui-a3/a3"
          npm publish --access public
          echo "::endgroup::"

          for dir in providers/bedrock providers/openai providers/anthropic; do
            PACKAGE_NAME=$(jq -r .name "$dir/package.json")
            echo "::group::Publish ${PACKAGE_NAME}"
            cd "$dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npm pkg set "peerDependencies.@genui-a3/a3=>=${VERSION}"
            npm publish --access public
            cd -
            echo "::endgroup::"
          done

          echo "::group::Publish @genui-a3/a3-create"
          cd create
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm publish --access public
          cd -
          echo "::endgroup::"
        shell: bash

      - name: Push tag
        if: steps.check_tag.outputs.skip != 'true'
        id: push_tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "new_tag=${TAG}" >> $GITHUB_OUTPUT

          previous_tag=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | sed -n '2p')
          echo "previous_tag=${previous_tag}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create changelog
        if: steps.check_tag.outputs.skip != 'true'
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          excludeTypes: ''
          fromTag: ${{ steps.push_tag.outputs.previous_tag != '' && steps.push_tag.outputs.new_tag || '' }}
          includeInvalidCommits: true
          tag: ${{ steps.push_tag.outputs.previous_tag == '' && steps.push_tag.outputs.new_tag || '' }}
          toTag: ${{ steps.push_tag.outputs.previous_tag != '' && steps.push_tag.outputs.previous_tag || '' }}
          token: ${{ github.token }}
          writeToFile: false

      - name: Create release
        if: steps.check_tag.outputs.skip != 'true'
        uses: ncipollo/release-action@v1
        with:
          body: ${{ steps.changelog.outputs.changes }}
          makeLatest: true
          name: 'v${{ steps.version.outputs.version }}'
          prerelease: false
          skipIfReleaseExists: true
          tag: ${{ steps.push_tag.outputs.new_tag }}

      - name: Clean up on failure
        if: ${{ failure() && steps.push_tag.outputs.new_tag }}
        run: |
          git push --delete origin "${{ steps.push_tag.outputs.new_tag }}"
        shell: bash
