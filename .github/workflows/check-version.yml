name: Check Version
on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - 'src/**'
      - 'example/**'
      - 'package.json'
      - 'tsconfig*'
      - 'tsup*'
      - 'create/**'
      - 'providers/**'
  workflow_dispatch:
jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            src/**
            providers/**
            create/**
            example/**
            package.json
            tsconfig*
            tsup*

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version tag: v${VERSION}"
        shell: bash

      - name: Check for tag
        if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git show-ref --tags --verify --quiet "refs/tags/${TAG}"; then
            echo "The tag ${TAG} already exists. Please bump the version in the root package.json."
            exit 1
          fi
          echo "✅ Tag ${TAG} does not exist — proceed with PR."
        shell: bash
