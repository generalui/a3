name: Check Version (create)
on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - 'create/**'
  workflow_dispatch:
jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version and Release Setup
        run: |
          version=$(cat create/package.json | jq -r '.version')
          version_tag="create-${version}"

          echo "version_tag=${version_tag}" >> $GITHUB_OUTPUT

          echo "::group::Version Tag"
          echo 'Version Tag: '${version_tag}
          echo "::endgroup::"
        shell: bash
        id: version

      - name: Check for Tag
        run: |
          tag="${{ steps.version.outputs.version_tag }}"

          if git show-ref --tags --verify --quiet "refs/tags/${tag}"; then
              echo "The tag ${tag} already exists, please update the version in 'create/package.json'."
              exit 1
          fi
          echo "Proceed with PR"
        shell: bash
