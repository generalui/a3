      # - name: Get the E2E report.
      #   if: steps.check-js.outputs.run == 'true'
      #   run: |
      #     # Stop the frontend instance
      #     ./scripts/stop.sh

      #     branch=${{ steps.job-info.outputs.pr_branch }}
      #     coverage_branch=${branch//[\":<>|*?\\\/]/-}
      #     coverage_dir=e2e-${coverage_branch}
      #     mkdir -p ${coverage_dir} && sudo cp -r coverage/e2e_reports ${coverage_dir}
      #     cp scripts/logs/frontend.log ${coverage_dir}

      #     echo "coverage_branch=${coverage_branch}" >> $GITHUB_OUTPUT
      #     echo "coverage_dir=${coverage_dir}" >> $GITHUB_OUTPUT

      #     echo "::group::Coverage Data"
      #     echo 'branch: '${coverage_branch}
      #     echo 'dir: '${coverage_dir}
      #     echo "::endgroup::"
      #   shell: bash
      #   id: e2e-report

      # - name: Upload the E2E report as an artifact
      #   if: steps.check-js.outputs.run == 'true'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ steps.e2e-report.outputs.coverage_branch }}-e2e-report
      #     path: ${{ steps.e2e-report.outputs.coverage_dir }}
      #     retention-days: 30

      # - name: Check E2E failure
      #   if: steps.e2e-smoke.outputs.tests_passed == 'false'
      #   run: exit 1
      #   shell: bash

      - name: Default Job Success
        if: steps.lint-docs.outputs.run == 'false' && steps.check-js.outputs.run == 'false'
        run: exit 0
